services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: bragi
      POSTGRES_USER: bragi
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bragi"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - proxy_net

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://bragi:${DB_PASSWORD}@db:5432/bragi
      JWT_SECRET: ${JWT_SECRET}
      PORT: 3001
      JIRA_BASE_URL: ${JIRA_BASE_URL:-}
      JIRA_EMAIL: ${JIRA_EMAIL:-}
      JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
      JIRA_STORY_POINTS_FIELD: ${JIRA_STORY_POINTS_FIELD:-}
      JIRA_EPIC_LINK_FIELD: ${JIRA_EPIC_LINK_FIELD:-}
      JIRA_PROD_PROJECT_KEY: ${JIRA_PROD_PROJECT_KEY:-}
      JIRA_EXCLUDED_STATUSES: ${JIRA_EXCLUDED_STATUSES:-}
      BAMBOOHR_SUBDOMAIN: ${BAMBOOHR_SUBDOMAIN:-}
      BAMBOOHR_API_KEY: ${BAMBOOHR_API_KEY:-}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@example.com}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-changeme123}
    volumes:
      - ./import:/import:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proxy_net
    command: sh -c "node prisma/prepare-schema.js; npx prisma db push --accept-data-loss && node prisma/seed.js && node src/index.js"

  frontend:
    build: .
    restart: unless-stopped
    ports:
      - "${PORT:-3003}:80"
    depends_on:
      - backend
    networks:
      - proxy_net

networks:
  proxy_net:
    external: true

volumes:
  postgres_data:
